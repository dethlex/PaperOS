[platformio]
default_envs = m5paper

[env]
build_flags =
    -DCORE_DEBUG_LEVEL=2
    -Wall -Wextra
    -std=gnu++17

; This block mirrors the OFFICIAL working M5Paper config from
; https://github.com/m5stack/M5Paper_FactoryTest/blob/main/platformio.ini
; M5EPD library requires this exact platform/core combo — generic latest
; espressif32 (^6.x) ships Arduino-ESP32 v3.x which silently breaks
; M5EPD's SPI/LEDC/FS calls (firmware runs but display never updates).
[env:m5paper]
platform = espressif32@^5.1.0
framework = arduino
board = m5stack-fire
platform_packages =
    platformio/framework-arduinoespressif32@3.20004.0
board_build.partitions = default_16MB.csv
upload_speed = 1500000
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
; Inject PAPEROS_VERSION from `git describe` (Settings → About → Version).
extra_scripts = pre:tools/version_flag.py
build_unflags =
    -std=gnu++11
build_flags =
    ${env.build_flags}
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; PNGdec default line buffer fits ~640px RGBA; bump to fit 1024px-wide
    ; wallpapers (PNG_TOO_BIG / rc=7 otherwise).
    -DPNG_MAX_BUFFERED_PIXELS=8200
    ; Arduino loopTask defaults to 8 KB stack; PNGdec + FreeType + canvas
    ; locals can blow it. Double it.
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=16384
board_build.embed_files =
    data/fonts/DejaVuSerif.ttf
    data/fonts/DejaVuSansMono-Bold.ttf
    data/default_wallpaper.bin
lib_deps =
    m5stack/M5EPD
    bblanchon/ArduinoJson@^7.0
    bitbank2/PNGdec@^1.0
    bodmer/TJpg_Decoder@^1.0

[env:native]
platform = native
build_flags = -std=gnu++17 -DPAPEROS_NATIVE -Isrc
test_framework = unity
test_build_src = yes
build_src_filter = +<util/> +<apps/reader/EncodingDetect.cpp> +<apps/reader/Paginator.cpp> +<apps/ha/Dashboard.cpp> +<services/weather/OpenMeteoParse.cpp> +<services/WeatherCache.cpp> +<services/CalendarCache.cpp> +<services/calendar/HaCalendarParse.cpp> +<services/calendar/CalendarSelect.cpp> +<services/ConfigJson.cpp> +<services/PrinterStatus.cpp> +<framework/LauncherOrder.cpp> +<apps/games/core/TicTacToeCore.cpp> +<apps/games/core/MinesweeperCore.cpp> +<apps/games/core/FifteenCore.cpp> +<apps/games/core/SudokuCore.cpp> +<i18n/I18n.cpp> +<i18n/lang_ru.cpp> +<i18n/lang_en.cpp> -<main.cpp>
lib_deps =
    bblanchon/ArduinoJson@^7.0
